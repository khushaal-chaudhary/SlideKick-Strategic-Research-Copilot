name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  python:
    name: Lint & test (agent + API)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            packages/agent/pyproject.toml
            api/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "packages/agent[dev]"
          pip install -r api/requirements.txt httpx

      - name: Ruff (agent)
        run: ruff check packages/agent

      - name: Ruff (api)
        run: ruff check api --config packages/agent/pyproject.toml

      - name: Agent tests
        run: pytest packages/agent/tests -q

      - name: API tests
        working-directory: api
        run: pytest tests -q

  web:
    name: Build frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
