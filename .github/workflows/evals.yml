name: Evals

on:
  workflow_dispatch:
    inputs:
      subset:
        description: "Number of queries to run (empty = full dataset)"
        required: false
        default: ""
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC

permissions:
  contents: write

jobs:
  evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e packages/agent
          pip install -r evals/requirements.txt

      - name: Run evals
        env:
          NEO4J_URI: ${{ secrets.NEO4J_URI }}
          NEO4J_USERNAME: ${{ secrets.NEO4J_USERNAME }}
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
          NEO4J_DATABASE: ${{ secrets.NEO4J_DATABASE }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          LLM_PROVIDER: groq
          LLM_MODEL: llama-3.3-70b-versatile
          LLM_FALLBACK_PROVIDER: none
          # gpt-oss judge on Groq: different model family than the Llama agent,
          # and Gemini free tier (~20 req/day) can't cover a full eval run
          EVAL_JUDGE_PROVIDER: groq
          LANGCHAIN_TRACING_V2: "false"
        run: |
          SUBSET="${{ github.event.inputs.subset }}"
          if [ -n "$SUBSET" ]; then
            python evals/run_evals.py --subset "$SUBSET" --sleep 20
          else
            python evals/run_evals.py --sleep 20
          fi

      - name: Commit results
        run: |
          cp evals/results/latest.json web/src/data/eval-results.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add evals/results web/src/data/eval-results.json
          git diff --cached --quiet || git commit -m "chore: update eval results ($(date -u +%F))"
          git push
